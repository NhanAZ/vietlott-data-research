name: Quy trình cập nhật dataset dùng chung

on:
  workflow_call:
    inputs:
      products:
        description: Danh sách sản phẩm, cách nhau bằng khoảng trắng
        required: true
        type: string
      report_name:
        description: Tên ngắn dùng cho artifact
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: vietlott-dataset-update
  cancel-in-progress: false

jobs:
  update:
    name: Cập nhật và kiểm tra dữ liệu
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      site_changed: ${{ steps.commit.outputs.changed }}
    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Đồng bộ nhánh main mới nhất
        run: git pull --ff-only origin main

      - name: Cài Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Cài chương trình
        run: python -m pip install -e .

      - name: Lưu báo cáo trước cập nhật
        shell: bash
        run: |
          before_dir="$RUNNER_TEMP/vietlott-reports/before"
          mkdir -p "$before_dir"
          for file in \
            datasets/metadata/dataset-summary.json \
            datasets/metadata/quality-report.json \
            datasets/metadata/snapshot-manifest.json \
            site/data/audit-summary.json \
            site/data/manifest.json \
            site/data/predictions.json; do
            if test -f "$file"; then
              cp "$file" "$before_dir/$(basename "$file")"
            fi
          done

      - name: Khôi phục kho làm việc
        run: vietlott-repository-data hydrate --source-dir datasets --destination-dir data

      - name: Đọc kỳ mới từ nguồn ưu tiên
        id: update
        continue-on-error: true
        shell: bash
        env:
          PRODUCTS: ${{ inputs.products }}
        run: |
          read -r -a selected_products <<< "$PRODUCTS"
          vietlott-auto-update \
            --products "${selected_products[@]}" \
            --output-dir data \
            --reconcile-pages 2 \
            --request-delay 0.8 \
            --jitter 0.25 \
            --retries 5 \
            --strict

      - name: Đóng gói và kiểm tra dataset
        shell: bash
        run: |
          report_dir="$RUNNER_TEMP/vietlott-reports"
          mkdir -p "$report_dir"
          if test -f data/incremental-update-report.json; then
            cp data/incremental-update-report.json "$report_dir/update-report.json"
          fi
          vietlott-repository-data publish \
            --source-dir data \
            --destination-dir datasets \
            > "$report_dir/publish-report.json"
          vietlott-repository-data validate \
            --source-dir datasets \
            > "$report_dir/validation-report.json"
          vietlott-repository-data audit \
            --source-dir datasets \
            > "$report_dir/quality-audit.json"
          vietlott-research-report \
            --datasets-dir datasets \
            --site-dir site \
            --prediction-ledger predictions/ledger.jsonl \
            > "$report_dir/research-report.json"
          after_dir="$report_dir/after"
          mkdir -p "$after_dir"
          cp datasets/metadata/dataset-summary.json "$after_dir/"
          cp datasets/metadata/quality-report.json "$after_dir/"
          cp datasets/metadata/snapshot-manifest.json "$after_dir/"
          cp site/data/audit-summary.json "$after_dir/"
          cp site/data/manifest.json "$after_dir/"
          cp site/data/predictions.json "$after_dir/"
          python scripts/check_quality_regressions.py \
            --before "$report_dir/before/quality-report.json" \
            --after datasets/metadata/quality-report.json \
            --output "$report_dir/quality-regressions.json" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Ghi tóm tắt lần cập nhật
        if: always()
        continue-on-error: true
        shell: bash
        run: >
          python scripts/github_update_summary.py
          --update-report "$RUNNER_TEMP/vietlott-reports/update-report.json"
          --validation-report "$RUNNER_TEMP/vietlott-reports/validation-report.json"
          --output "$GITHUB_STEP_SUMMARY"

      - name: Lưu báo cáo chẩn đoán
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: vietlott-${{ inputs.report_name }}-${{ github.run_id }}
          path: ${{ runner.temp }}/vietlott-reports
          if-no-files-found: ignore
          retention-days: 14

      - name: Đồng bộ main trước khi commit dữ liệu
        shell: bash
        run: |
          git fetch origin main
          if test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"; then
            exit 0
          fi

          patch_file="$RUNNER_TEMP/vietlott-data-update.patch"
          git diff --binary -- datasets predictions > "$patch_file"
          git reset --hard origin/main

          if test -s "$patch_file"; then
            git apply --3way "$patch_file"
          fi

          python -m pip install -e .
          report_dir="$RUNNER_TEMP/vietlott-reports"
          mkdir -p "$report_dir"
          vietlott-repository-data validate \
            --source-dir datasets \
            > "$report_dir/validation-report-after-main-sync.json"
          vietlott-repository-data audit \
            --source-dir datasets \
            > "$report_dir/quality-audit-after-main-sync.json"
          vietlott-research-report \
            --datasets-dir datasets \
            --site-dir site \
            --prediction-ledger predictions/ledger.jsonl \
            > "$report_dir/research-report-after-main-sync.json"

      - name: Commit khi dữ liệu thay đổi
        id: commit
        shell: bash
        run: |
          git add datasets predictions site/data
          if git diff --cached --quiet; then
            echo "Không có kỳ mới hoặc thay đổi chính thức"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "data: cập nhật kết quả Vietlott"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Cấu hình GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v6

      - name: Đóng gói website
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Báo lỗi nguồn sau khi bảo toàn dữ liệu hợp lệ
        if: steps.update.outcome == 'failure'
        run: exit 1

  deploy:
    name: Triển khai báo cáo thống kê
    needs: update
    if: always() && needs.update.outputs.site_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Triển khai GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
