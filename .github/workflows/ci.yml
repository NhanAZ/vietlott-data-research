name: Kiểm tra mã nguồn

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cài thư viện
        run: python -m pip install -e ".[dev]"

      - name: Kiểm tra định dạng và lỗi tĩnh
        run: python -m ruff check .

      - name: Chạy unit test
        run: python -m pytest

      - name: Kiểm tra dataset
        run: vietlott-repository-data validate --source-dir datasets
